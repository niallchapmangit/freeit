---
# GitRepository — tells Flux where to pull manifests from.
# COMPANY_ID and REPO_URL are replaced by the deploy-trigger script.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: freeit
  namespace: flux-system
spec:
  interval: 5m
  url: REPO_URL          # replaced at deploy time
  ref:
    branch: main
  secretRef:
    name: freeit-deploy-key
---
# Root Kustomization — reconciles everything under this company's cluster dir.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: freeit-COMPANY_ID
  namespace: flux-system
spec:
  interval: 10m
  path: ./gitops/clusters/COMPANY_ID
  prune: true
  sourceRef:
    kind: GitRepository
    name: freeit
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: company-vars
