---
# Per-company variable substitution map.
# Flux postBuild.substituteFrom injects these into all manifests in this cluster.
# Generated by the deploy-trigger script — do not edit manually.
apiVersion: v1
kind: ConfigMap
metadata:
  name: company-vars
  namespace: flux-system
data:
  company_id: "COMPANY_ID"
  company_domain: "COMPANY_DOMAIN"   # e.g. acme-demo.free-it-infra.com
  cluster_issuer: "wildcard-tls"
