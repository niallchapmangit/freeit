# Required — set per company by bootstrap-cluster.sh at deploy time.
companyId: ""
domain: ""

ingress:
  tlsSecret: wildcard-tls

keycloak:
  auth:
    adminUser: admin
    # adminPassword injected from the keycloak-secrets Secret at deploy time.
    existingSecret: keycloak-secrets
    passwordSecretKey: admin-password

  production: true
  proxy: edge   # TLS terminated at ingress-nginx

  ingress:
    enabled: false

  postgresql:
    enabled: true
    auth:
      existingSecret: keycloak-secrets
      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: postgres-user-password

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

  # Realm + client config is handled by bootstrap-realm.sh post-deploy.
  # Do not pre-bake realm JSON here — it changes per company.
  extraEnvVars:
    - name: KC_FEATURES
      value: "token-exchange,admin-fine-grained-authz"
