{{/*
  The wildcard TLS secret lives in ingress-nginx (where ingress-nginx can read it).
  Keycloak's own ingress rule references it by name — ingress-nginx resolves it
  from the ingress-nginx namespace via the default-ssl-certificate flag, so no
  copy is needed. This file is intentionally empty but kept as a placeholder
  so the pattern is clear: DO NOT copy TLS secrets across namespaces manually.
  If a chart needs its own copy, use the kubernetes-reflector sidecar (E1.4+).
*/}}
